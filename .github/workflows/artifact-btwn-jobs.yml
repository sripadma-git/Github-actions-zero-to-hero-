name: artifact-between-jobs

on:
 workflow_dispatch: 

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create file
        run: echo "this is job1 artifact" > job1.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: job1 file
          path: job1.txt

  job2:
    runs-on: ubuntu-latest
    needs: [job1]
    steps:
      - name: download from job1
        uses: actions/download-artifact@v4
        with:
          name: job1 file

      - name: print
        run: cat job1.txt