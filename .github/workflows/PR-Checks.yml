on:
  pull_request:
    branches: [main]

jobs:
  file-size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check file sizes
        run: |
          find . -size +1M | grep -v ".git" | while read f; do
            echo "FAIL: $f is larger than 1MB"
            exit 1
          done

  branch-name-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ ^(feature|fix|docs)/ ]]; then
            echo "Branch name OK: $BRANCH"
          else
            echo "Bad branch name: $BRANCH"
            exit 1   # exit 1 = FAIL the job
          fi

  pr-body-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [ -z "$BODY" ]; then
            echo "Warning: PR has no description"
            # No exit 1 here = just a warning, doesn't fail
          fi
