name: Run Tests
on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20        # ← change 18 to 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
